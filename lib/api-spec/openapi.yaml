openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: focus
    description: FinOps FOCUS dashboard operations
  - name: connections
    description: Provider data connections (AWS / Azure / GCP / sample)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /focus/filters:
    get:
      operationId: getFocusFilters
      tags: [focus]
      summary: Get available global filter options
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusFilters"

  /focus/summary:
    get:
      operationId: getFocusSummary
      tags: [focus]
      summary: Top-of-page summary (budget vs forecast and savings totals)
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSummary"

  /focus/timeseries:
    get:
      operationId: getFocusTimeSeries
      tags: [focus]
      summary: Past costs trend, broken down by provider
      parameters:
        - in: query
          name: months
          required: false
          description: Convenience preset (3, 6 or 12 trailing months). Ignored when both startDate and endDate are provided.
          schema:
            type: integer
            enum: [3, 6, 12]
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusTimeSeries"

  /focus/breakdown:
    get:
      operationId: getFocusBreakdown
      tags: [focus]
      summary: Cost broken down by a FOCUS dimension
      parameters:
        - in: query
          name: dimension
          required: true
          schema:
            type: string
            enum:
              [serviceCategory, chargeCategory, serviceName, team, product, provider]
        - in: query
          name: parent
          required: false
          description: Optional parent value to drill down (e.g. ServiceCategory when listing services)
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusBreakdown"

  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List provider connections for the current tenant
      responses:
        "200":
          description: Connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionList"
    post:
      operationId: createConnection
      tags: [connections]
      summary: Add a new provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /connections/{id}:
    delete:
      operationId: deleteConnection
      tags: [connections]
      summary: Remove a provider connection
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /connections/{id}/sync:
    post:
      operationId: syncConnection
      tags: [connections]
      summary: Trigger an on-demand sync for a connection
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /focus/savings:
    get:
      operationId: getFocusSavings
      tags: [focus]
      summary: Identified savings opportunities
      parameters:
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
      responses:
        "200":
          description: Savings opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSavings"

  /tenants/{tenantId}/onboarding-summary:
    get:
      operationId: getOnboardingSummary
      tags: [tenants]
      summary: Cross-app onboarding summary for a tenant
      description: Lightweight aggregate used by the onboarding app to know whether a connection already exists, and by the dashboard to show onboarding status.
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSummary"
        "404":
          description: Unknown tenant

components:
  parameters:
    StartDateParam:
      in: query
      name: startDate
      required: false
      description: Inclusive ISO date (YYYY-MM-DD) for ChargePeriodStart
      schema:
        type: string
    EndDateParam:
      in: query
      name: endDate
      required: false
      description: Exclusive ISO date (YYYY-MM-DD) for ChargePeriodEnd
      schema:
        type: string
    ProvidersParam:
      in: query
      name: providers
      required: false
      description: Comma-separated list of FOCUS ProviderName values
      schema:
        type: string
    TeamsParam:
      in: query
      name: teams
      required: false
      description: Comma-separated list of x_Team values
      schema:
        type: string
    ProductsParam:
      in: query
      name: products
      required: false
      description: Comma-separated list of x_Product values
      schema:
        type: string
    CostTypeParam:
      in: query
      name: costType
      required: false
      description: Which FOCUS cost column to aggregate
      schema:
        type: string
        enum: [BilledCost, EffectiveCost]
        default: EffectiveCost

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    FocusFilters:
      type: object
      required: [providers, teams, products, categories, currency, periodStart, periodEnd]
      properties:
        providers:
          type: array
          items: { type: string }
        teams:
          type: array
          items: { type: string }
        products:
          type: array
          items: { type: string }
        categories:
          type: array
          items: { type: string }
        currency:
          type: string
        periodStart:
          type: string
        periodEnd:
          type: string

    SavingOpportunity:
      type: object
      required:
        [
          id,
          title,
          category,
          provider,
          service,
          monthlySavings,
          recommendedAction,
          effort,
          team,
          product,
        ]
      properties:
        id: { type: string }
        title: { type: string }
        category:
          type: string
          description: e.g. idle, rightsizing, commitment, untagged, storage-tier
        provider: { type: string }
        service: { type: string }
        resourceId: { type: string }
        team: { type: string }
        product: { type: string }
        monthlySavings: { type: number }
        currency: { type: string }
        recommendedAction: { type: string }
        effort:
          type: string
          enum: [low, medium, high]
        details: { type: string }

    FocusSummary:
      type: object
      required:
        [
          currency,
          periodStart,
          periodEnd,
          actualSpend,
          forecastSpend,
          budget,
          percentConsumed,
          projectedDelta,
          savingsTotal,
          savingsCount,
          topSavings,
          costType,
        ]
      properties:
        currency: { type: string }
        periodStart: { type: string }
        periodEnd: { type: string }
        costType: { type: string }
        actualSpend: { type: number }
        forecastSpend: { type: number }
        budget: { type: number }
        percentConsumed: { type: number }
        projectedDelta: { type: number, description: forecast minus budget }
        savingsTotal: { type: number }
        savingsCount: { type: integer }
        topSavings:
          type: array
          items:
            $ref: "#/components/schemas/SavingOpportunity"
        dataSource:
          type: string
          enum: [mock, live]
          description: Which backing dataset served this response
        provisionalUntil:
          type: string
          description: ISO date — costs after this date are provisional and may be restated
        hasLiveData:
          type: boolean
          description: True when the tenant has any ingested rows

    ConnectionInput:
      type: object
      required: [provider, displayName]
      properties:
        provider:
          type: string
          enum: [sample, aws, azure, gcp]
        displayName: { type: string }
        config:
          type: object
          additionalProperties: true
        secretRef:
          type: string
          description: Name of the Replit Secret holding sensitive credentials
        refreshIntervalHours:
          type: string
          enum: ["4", "24"]
          description: Auto-refresh interval. 4h is only valid for Azure connections.

    Connection:
      type: object
      required: [id, tenantId, provider, displayName, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        provider: { type: string }
        displayName: { type: string }
        config:
          type: object
          additionalProperties: true
        secretRef: { type: string }
        status: { type: string, enum: [pending, ok, error, syncing] }
        lastError: { type: string }
        lastSyncedAt: { type: string }
        nextSyncAt: { type: string }
        refreshIntervalHours: { type: string }
        createdAt: { type: string }

    ConnectionList:
      type: object
      required: [tenantId, dataSource, hasLiveData, connections]
      properties:
        tenantId: { type: string }
        dataSource: { type: string, enum: [mock, live] }
        hasLiveData: { type: boolean }
        connections:
          type: array
          items:
            $ref: "#/components/schemas/Connection"

    SyncResult:
      type: object
      required: [status, rowsUpserted, partitionsRead]
      properties:
        status: { type: string, enum: [ok, error] }
        rowsUpserted: { type: integer }
        partitionsRead: { type: integer }
        error: { type: string }

    TimeSeriesPoint:
      type: object
      required: [period, total, byProvider]
      properties:
        period: { type: string, description: YYYY-MM }
        total: { type: number }
        byProvider:
          type: object
          additionalProperties:
            type: number

    FocusTimeSeries:
      type: object
      required: [currency, costType, points, momDelta, momDeltaPercent, totalRange, previousRangeTotal]
      properties:
        currency: { type: string }
        costType: { type: string }
        points:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        momDelta: { type: number, description: latest month minus previous month }
        momDeltaPercent: { type: number }
        totalRange: { type: number }
        previousRangeTotal: { type: number }

    BreakdownItem:
      type: object
      required: [key, label, amount, percent]
      properties:
        key: { type: string }
        label: { type: string }
        amount: { type: number }
        percent: { type: number }
        sparkline:
          type: array
          items: { type: number }
        meta:
          type: object
          additionalProperties:
            type: string

    FocusBreakdown:
      type: object
      required: [dimension, currency, costType, totalAmount, items]
      properties:
        dimension: { type: string }
        parent: { type: string }
        currency: { type: string }
        costType: { type: string }
        totalAmount: { type: number }
        items:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"

    FocusSavings:
      type: object
      required: [currency, totalMonthlySavings, count, opportunities]
      properties:
        currency: { type: string }
        totalMonthlySavings: { type: number }
        count: { type: integer }
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/SavingOpportunity"

    OnboardingSummary:
      type: object
      required: [tenantId, hasActiveConnection, connectionCount, stagesTotal, stagesCompleted, currentStage]
      properties:
        tenantId: { type: string }
        hasActiveConnection: { type: boolean, description: True when at least one provider_connection has status='ok' }
        connectionCount: { type: integer, description: Total provider_connections rows for this tenant }
        stagesTotal: { type: integer, description: Total customer-visible stages in the onboarding journey }
        stagesCompleted: { type: integer, description: Stages estimated as completed (derived from connection state for now) }
        currentStage:
          type: object
          required: [number, title]
          properties:
            number: { type: integer }
            title: { type: string }
