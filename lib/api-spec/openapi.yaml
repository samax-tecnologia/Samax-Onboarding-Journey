openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: focus
    description: FinOps FOCUS dashboard operations
  - name: connections
    description: Provider data connections (AWS / Azure / GCP / sample)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /focus/filters:
    get:
      operationId: getFocusFilters
      tags: [focus]
      summary: Get available global filter options
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusFilters"

  /focus/summary:
    get:
      operationId: getFocusSummary
      tags: [focus]
      summary: Top-of-page summary (budget vs forecast and savings totals)
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSummary"

  /focus/timeseries:
    get:
      operationId: getFocusTimeSeries
      tags: [focus]
      summary: Past costs trend, broken down by provider
      parameters:
        - in: query
          name: months
          required: false
          description: Convenience preset (3, 6 or 12 trailing months). Ignored when both startDate and endDate are provided.
          schema:
            type: integer
            enum: [3, 6, 12]
        - in: query
          name: granularity
          required: false
          description: |
            Bucket size for emitted points. "month" (default) emits one
            YYYY-MM point per month in the window. "day" emits one
            YYYY-MM-DD point per day, with each month's cost prorated
            uniformly across the days of that month. momDelta and the
            "previousRangeTotal" still describe period-over-period at the
            chosen granularity.
          schema:
            type: string
            enum: [month, day]
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusTimeSeries"

  /focus/breakdown:
    get:
      operationId: getFocusBreakdown
      tags: [focus]
      summary: Cost broken down by a FOCUS dimension
      parameters:
        - in: query
          name: dimension
          required: true
          schema:
            type: string
            enum:
              [serviceCategory, chargeCategory, serviceName, team, product, provider]
        - in: query
          name: parent
          required: false
          description: Optional parent value to drill down (e.g. ServiceCategory when listing services)
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
        - $ref: "#/components/parameters/CostTypeParam"
      responses:
        "200":
          description: Breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusBreakdown"

  /connections:
    get:
      operationId: listConnections
      tags: [connections]
      summary: List provider connections for the current tenant
      responses:
        "200":
          description: Connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionList"
    post:
      operationId: createConnection
      tags: [connections]
      summary: Add a new provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /connections/{id}:
    delete:
      operationId: deleteConnection
      tags: [connections]
      summary: Remove a provider connection
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /connections/{id}/sync:
    post:
      operationId: syncConnection
      tags: [connections]
      summary: Trigger an on-demand sync for a connection
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /focus/savings:
    get:
      operationId: getFocusSavings
      tags: [focus]
      summary: Identified savings opportunities
      parameters:
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TeamsParam"
        - $ref: "#/components/parameters/ProductsParam"
      responses:
        "200":
          description: Savings opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSavings"

  /tenants/{tenantId}/baselines:
    get:
      operationId: listBaselines
      tags: [reports]
      summary: List baselines for a tenant
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Baselines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Baseline"
    post:
      operationId: createBaseline
      tags: [reports]
      summary: Create a baseline from a period
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaselineInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Baseline"

  /applied-changes:
    get:
      operationId: listAppliedChanges
      tags: [reports]
      summary: List applied changes for the current tenant
      responses:
        "200":
          description: Applied changes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppliedChange"
    post:
      operationId: createAppliedChange
      tags: [reports]
      summary: Record a new applied change (typically from an opportunity)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppliedChangeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppliedChange"

  /applied-changes/{id}:
    patch:
      operationId: updateAppliedChange
      tags: [reports]
      summary: Update an applied change (e.g. realized savings override)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppliedChangeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppliedChange"
    delete:
      operationId: deleteAppliedChange
      tags: [reports]
      summary: Delete an applied change
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /optimization-reports:
    get:
      operationId: listOptimizationReports
      tags: [reports]
      summary: List optimization reports for the current tenant
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptimizationReportSummary"
    post:
      operationId: createOptimizationReport
      tags: [reports]
      summary: Generate and persist a new optimization report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizationReportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationReport"

  /optimization-reports/{id}:
    get:
      operationId: getOptimizationReport
      tags: [reports]
      summary: Retrieve a generated optimization report (frozen snapshot)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationReport"
    delete:
      operationId: deleteOptimizationReport
      tags: [reports]
      summary: Delete a stored optimization report
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tenants/{tenantId}/latest-optimization-report:
    get:
      operationId: getLatestOptimizationReport
      tags: [reports]
      summary: Latest optimization report summary for a tenant (or 204 if none)
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Latest report summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationReportSummary"
        "204":
          description: No reports yet

  /tenants/{tenantId}/onboarding-summary:
    get:
      operationId: getOnboardingSummary
      tags: [tenants]
      summary: Cross-app onboarding summary for a tenant
      description: Lightweight aggregate used by the onboarding app to know whether a connection already exists, and by the dashboard to show onboarding status.
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSummary"
        "404":
          description: Unknown tenant

components:
  parameters:
    StartDateParam:
      in: query
      name: startDate
      required: false
      description: Inclusive ISO date (YYYY-MM-DD) for ChargePeriodStart
      schema:
        type: string
    EndDateParam:
      in: query
      name: endDate
      required: false
      description: Exclusive ISO date (YYYY-MM-DD) for ChargePeriodEnd
      schema:
        type: string
    ProvidersParam:
      in: query
      name: providers
      required: false
      description: Comma-separated list of FOCUS ProviderName values
      schema:
        type: string
    TeamsParam:
      in: query
      name: teams
      required: false
      description: Comma-separated list of x_Team values
      schema:
        type: string
    ProductsParam:
      in: query
      name: products
      required: false
      description: Comma-separated list of x_Product values
      schema:
        type: string
    CostTypeParam:
      in: query
      name: costType
      required: false
      description: Which FOCUS cost column to aggregate
      schema:
        type: string
        enum: [BilledCost, EffectiveCost]
        default: EffectiveCost

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    FocusFilters:
      type: object
      required: [providers, teams, products, categories, currency, periodStart, periodEnd]
      properties:
        providers:
          type: array
          items: { type: string }
        teams:
          type: array
          items: { type: string }
        products:
          type: array
          items: { type: string }
        categories:
          type: array
          items: { type: string }
        currency:
          type: string
        periodStart:
          type: string
        periodEnd:
          type: string

    SavingOpportunity:
      type: object
      required:
        [
          id,
          title,
          category,
          provider,
          service,
          monthlySavings,
          recommendedAction,
          effort,
          team,
          product,
        ]
      properties:
        id: { type: string }
        title: { type: string }
        category:
          type: string
          description: e.g. idle, rightsizing, commitment, untagged, storage-tier
        provider: { type: string }
        service: { type: string }
        resourceId: { type: string }
        team: { type: string }
        product: { type: string }
        monthlySavings: { type: number }
        currency: { type: string }
        recommendedAction: { type: string }
        effort:
          type: string
          enum: [low, medium, high]
        details: { type: string }

    FocusSummary:
      type: object
      required:
        [
          currency,
          periodStart,
          periodEnd,
          actualSpend,
          forecastSpend,
          budget,
          percentConsumed,
          projectedDelta,
          savingsTotal,
          savingsCount,
          topSavings,
          costType,
        ]
      properties:
        currency: { type: string }
        periodStart: { type: string }
        periodEnd: { type: string }
        costType: { type: string }
        actualSpend: { type: number }
        forecastSpend: { type: number }
        budget: { type: number }
        percentConsumed: { type: number }
        projectedDelta: { type: number, description: forecast minus budget }
        savingsTotal: { type: number }
        savingsCount: { type: integer }
        topSavings:
          type: array
          items:
            $ref: "#/components/schemas/SavingOpportunity"
        dataSource:
          type: string
          enum: [mock, live]
          description: Which backing dataset served this response
        provisionalUntil:
          type: string
          description: ISO date — costs after this date are provisional and may be restated
        hasLiveData:
          type: boolean
          description: True when the tenant has any ingested rows

    ConnectionInput:
      type: object
      required: [provider, displayName]
      properties:
        provider:
          type: string
          enum: [sample, aws, azure, gcp]
        displayName: { type: string }
        config:
          type: object
          additionalProperties: true
        secretRef:
          type: string
          description: Name of the Replit Secret holding sensitive credentials
        refreshIntervalHours:
          type: string
          enum: ["4", "24"]
          description: Auto-refresh interval. 4h is only valid for Azure connections.

    Connection:
      type: object
      required: [id, tenantId, provider, displayName, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        provider: { type: string }
        displayName: { type: string }
        config:
          type: object
          additionalProperties: true
        secretRef: { type: string }
        status: { type: string, enum: [pending, ok, error, syncing] }
        lastError: { type: string }
        lastSyncedAt: { type: string }
        nextSyncAt: { type: string }
        refreshIntervalHours: { type: string }
        createdAt: { type: string }

    ConnectionList:
      type: object
      required: [tenantId, dataSource, hasLiveData, connections]
      properties:
        tenantId: { type: string }
        dataSource: { type: string, enum: [mock, live] }
        hasLiveData: { type: boolean }
        connections:
          type: array
          items:
            $ref: "#/components/schemas/Connection"

    SyncResult:
      type: object
      required: [status, rowsUpserted, partitionsRead]
      properties:
        status: { type: string, enum: [ok, error] }
        rowsUpserted: { type: integer }
        partitionsRead: { type: integer }
        error: { type: string }

    TimeSeriesPoint:
      type: object
      required: [period, total, byProvider]
      properties:
        period: { type: string, description: YYYY-MM }
        total: { type: number }
        byProvider:
          type: object
          additionalProperties:
            type: number

    FocusTimeSeries:
      type: object
      required: [currency, costType, points, momDelta, momDeltaPercent, totalRange, previousRangeTotal]
      properties:
        currency: { type: string }
        costType: { type: string }
        points:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        momDelta: { type: number, description: latest month minus previous month }
        momDeltaPercent: { type: number }
        totalRange: { type: number }
        previousRangeTotal: { type: number }

    BreakdownItem:
      type: object
      required: [key, label, amount, percent]
      properties:
        key: { type: string }
        label: { type: string }
        amount: { type: number }
        percent: { type: number }
        sparkline:
          type: array
          items: { type: number }
        meta:
          type: object
          additionalProperties:
            type: string

    FocusBreakdown:
      type: object
      required: [dimension, currency, costType, totalAmount, items]
      properties:
        dimension: { type: string }
        parent: { type: string }
        currency: { type: string }
        costType: { type: string }
        totalAmount: { type: number }
        items:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"

    FocusSavings:
      type: object
      required: [currency, totalMonthlySavings, count, opportunities]
      properties:
        currency: { type: string }
        totalMonthlySavings: { type: number }
        count: { type: integer }
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/SavingOpportunity"

    OnboardingSummary:
      type: object
      required: [tenantId, hasActiveConnection, connectionCount, stagesTotal, stagesCompleted, currentStage]
      properties:
        tenantId: { type: string }
        hasActiveConnection: { type: boolean, description: True when at least one provider_connection has status='ok' }
        connectionCount: { type: integer, description: Total provider_connections rows for this tenant }
        stagesTotal: { type: integer, description: Total customer-visible stages in the onboarding journey }
        stagesCompleted: { type: integer, description: Stages estimated as completed (derived from connection state for now) }
        currentStage:
          type: object
          required: [number, title]
          properties:
            number: { type: integer }
            title: { type: string }

    Baseline:
      type: object
      required:
        - id
        - tenantId
        - label
        - periodStart
        - periodEnd
        - costType
        - currency
        - totalCost
        - monthlyAvg
        - months
        - source
        - isActive
        - createdAt
        - byService
        - byCategory
        - byProvider
        - byTeam
        - byProduct
      properties:
        id: { type: string }
        tenantId: { type: string }
        label: { type: string }
        periodStart: { type: string, description: "ISO date (inclusive)" }
        periodEnd: { type: string, description: "ISO date (exclusive)" }
        costType: { type: string }
        currency: { type: string }
        totalCost: { type: number }
        monthlyAvg: { type: number }
        months: { type: integer }
        source: { type: string, description: "auto | manual" }
        isActive: { type: boolean }
        createdAt: { type: string }
        byService:
          type: object
          additionalProperties: { type: number }
        byCategory:
          type: object
          additionalProperties: { type: number }
        byProvider:
          type: object
          additionalProperties: { type: number }
        byTeam:
          type: object
          additionalProperties: { type: number }
        byProduct:
          type: object
          additionalProperties: { type: number }

    BaselineInput:
      type: object
      required: [label, periodStart, periodEnd]
      properties:
        label: { type: string }
        periodStart: { type: string, description: "ISO date (YYYY-MM-DD), inclusive" }
        periodEnd: { type: string, description: "ISO date (YYYY-MM-DD), exclusive" }
        costType:
          type: string
          enum: [BilledCost, EffectiveCost]
        source:
          type: string
          enum: [auto, manual]
        setActive:
          type: boolean
          description: "If true (default), mark this baseline as the active one for the tenant"

    AppliedChange:
      type: object
      required:
        - id
        - tenantId
        - title
        - appliedAt
        - estimatedMonthlySavings
        - status
        - createdAt
      properties:
        id: { type: string }
        tenantId: { type: string }
        opportunityId:
          type: ["string", "null"]
        title: { type: string }
        description:
          type: ["string", "null"]
        scopeProvider:
          type: ["string", "null"]
        scopeService:
          type: ["string", "null"]
        scopeCategory:
          type: ["string", "null"]
        scopeTeam:
          type: ["string", "null"]
        scopeProduct:
          type: ["string", "null"]
        scopeResourceId:
          type: ["string", "null"]
        appliedAt: { type: string }
        author:
          type: ["string", "null"]
        estimatedMonthlySavings: { type: number }
        realizedMonthlySavingsOverride:
          type: ["number", "null"]
        status: { type: string, description: "active | reverted" }
        createdAt: { type: string }

    AppliedChangeInput:
      type: object
      required: [title, appliedAt, estimatedMonthlySavings]
      properties:
        opportunityId: { type: string }
        title: { type: string }
        description: { type: string }
        scopeProvider: { type: string }
        scopeService: { type: string }
        scopeCategory: { type: string }
        scopeTeam: { type: string }
        scopeProduct: { type: string }
        scopeResourceId: { type: string }
        appliedAt: { type: string }
        author: { type: string }
        estimatedMonthlySavings: { type: number }
        realizedMonthlySavingsOverride: { type: number }

    AppliedChangeUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        appliedAt: { type: string }
        author: { type: string }
        estimatedMonthlySavings: { type: number }
        realizedMonthlySavingsOverride:
          type: ["number", "null"]
        status:
          type: string
          enum: [active, reverted]

    OptimizationReportInput:
      type: object
      required: [title, periodStart, periodEnd]
      properties:
        title: { type: string }
        periodStart: { type: string, description: "ISO date (YYYY-MM-DD), inclusive" }
        periodEnd: { type: string, description: "ISO date (YYYY-MM-DD), exclusive" }
        baselineId:
          type: string
          description: "If omitted, the active baseline (or most recent) is used."
        costType:
          type: string
          enum: [BilledCost, EffectiveCost]
        author: { type: string }
        unitEconomics:
          type: array
          description: "Optional unit-economics metrics (with denominator data) to include in the report."
          items:
            $ref: "#/components/schemas/ReportUnitEconomicsInput"

    ReportUnitEconomicsInput:
      type: object
      required: [id, name, unitLabel, format, denominator]
      properties:
        id: { type: string }
        name: { type: string }
        unitLabel: { type: string }
        format:
          type: string
          enum: [currency, percent]
        granularity:
          type: string
          enum: [month, day]
        numerator:
          type: object
          properties:
            providers:
              type: array
              items: { type: string }
            teams:
              type: array
              items: { type: string }
            products:
              type: array
              items: { type: string }
        denominator:
          type: object
          additionalProperties: { type: number }
          description: "Map of period key (YYYY-MM or YYYY-MM-DD) to denominator value."

    OptimizationReportSummary:
      type: object
      required:
        - id
        - tenantId
        - title
        - periodStart
        - periodEnd
        - currency
        - totalCost
        - baselineProjectedCost
        - realizedSavings
        - appliedChangesCount
        - createdAt
      properties:
        id: { type: string }
        tenantId: { type: string }
        title: { type: string }
        periodStart: { type: string }
        periodEnd: { type: string }
        baselineId:
          type: ["string", "null"]
        baselineLabel:
          type: ["string", "null"]
        author:
          type: ["string", "null"]
        currency: { type: string }
        totalCost: { type: number }
        baselineProjectedCost: { type: number }
        realizedSavings: { type: number }
        appliedChangesCount: { type: integer }
        pdfUrl: { type: string }
        createdAt: { type: string }

    OptimizationReport:
      allOf:
        - $ref: "#/components/schemas/OptimizationReportSummary"
        - type: object
          required: [sections]
          properties:
            sections:
              type: object
              required:
                - executiveSummary
                - topWins
                - timeSeries
                - efficiency
                - byCategory
                - byProvider
                - byService
                - byTeam
                - byProduct
                - appliedChanges
                - openOpportunities
                - baselineSnapshot
              properties:
                timeSeries:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportTimeSeriesPoint"
                efficiency:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportEfficiencyMetric"
                executiveSummary:
                  type: object
                  required: [periodLabel, baselineLabel, totalCost, baselineProjectedCost, realizedSavings, savingsPercent, appliedChangesCount, openOpportunitiesCount, openOpportunitiesMonthlySavings, topWinsLabel]
                  properties:
                    periodLabel: { type: string }
                    baselineLabel: { type: string }
                    totalCost: { type: number }
                    baselineProjectedCost: { type: number }
                    realizedSavings: { type: number }
                    savingsPercent: { type: number }
                    appliedChangesCount: { type: integer }
                    openOpportunitiesCount: { type: integer }
                    openOpportunitiesMonthlySavings: { type: number }
                    topWinsLabel:
                      type: ["string", "null"]
                topWins:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportTopWin"
                byCategory:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportComparisonRow"
                byProvider:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportComparisonRow"
                byService:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportComparisonRow"
                byTeam:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportComparisonRow"
                byProduct:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportComparisonRow"
                appliedChanges:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportAppliedChange"
                openOpportunities:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReportOpportunity"
                baselineSnapshot:
                  type: object
                  required: [periodStart, periodEnd, totalCost, monthlyAvg, months]
                  properties:
                    periodStart: { type: string }
                    periodEnd: { type: string }
                    totalCost: { type: number }
                    monthlyAvg: { type: number }
                    months: { type: integer }
                unitEconomics:
                  type: array
                  description: "Per-metric unit economics computed for the report period."
                  items:
                    $ref: "#/components/schemas/ReportUnitEconomicsMetric"

    ReportUnitEconomicsMetric:
      type: object
      required: [id, name, unitLabel, format, granularity, series]
      properties:
        id: { type: string }
        name: { type: string }
        unitLabel: { type: string }
        format:
          type: string
          enum: [currency, percent]
        granularity:
          type: string
          enum: [month, day]
        currentUnitCost:
          type: ["number", "null"]
        previousUnitCost:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        deltaPercent:
          type: ["number", "null"]
        currentPeriodLabel:
          type: ["string", "null"]
        previousPeriodLabel:
          type: ["string", "null"]
        series:
          type: array
          items:
            $ref: "#/components/schemas/ReportUnitEconomicsPoint"

    ReportUnitEconomicsPoint:
      type: object
      required: [period, cost]
      properties:
        period: { type: string }
        cost: { type: number }
        volume:
          type: ["number", "null"]
        unitCost:
          type: ["number", "null"]

    ReportTimeSeriesPoint:
      type: object
      required: [month, actual, projectedNoOptimization]
      properties:
        month: { type: string }
        actual: { type: number }
        projectedNoOptimization: { type: number }

    ReportEfficiencyMetric:
      type: object
      required: [key, label, value, unit, baselineValue, delta, hint]
      properties:
        key: { type: string }
        label: { type: string }
        value: { type: number }
        unit: { type: string }
        baselineValue:
          type: ["number", "null"]
        delta:
          type: ["number", "null"]
        hint: { type: string }

    ReportComparisonRow:
      type: object
      required: [key, label, current, baseline, delta, deltaPct]
      properties:
        key: { type: string }
        label: { type: string }
        current: { type: number }
        baseline: { type: number }
        delta: { type: number }
        deltaPct: { type: number }

    ReportTopWin:
      type: object
      required: [id, title, realizedMonthlySavings, realizedPeriodSavings, scope]
      properties:
        id: { type: string }
        title: { type: string }
        realizedMonthlySavings: { type: number }
        realizedPeriodSavings: { type: number }
        scope:
          type: ["string", "null"]

    ReportAppliedChange:
      type: object
      required: [id, title, status, appliedAt, estimatedMonthlySavings, realizedMonthlySavings, realizedPeriodSavings, activeMonths]
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string, description: "active | reverted" }
        opportunityId:
          type: ["string", "null"]
        appliedAt: { type: string }
        author:
          type: ["string", "null"]
        estimatedMonthlySavings: { type: number }
        realizedMonthlySavings: { type: number }
        realizedPeriodSavings: { type: number }
        activeMonths: { type: integer }
        scopeProvider:
          type: ["string", "null"]
        scopeService:
          type: ["string", "null"]
        scopeCategory:
          type: ["string", "null"]

    ReportOpportunity:
      type: object
      required: [id, title, category, provider, service, monthlySavings, effort]
      properties:
        id: { type: string }
        title: { type: string }
        category: { type: string }
        provider: { type: string }
        service: { type: string }
        monthlySavings: { type: number }
        effort: { type: string }
        team: { type: string }
        product: { type: string }
